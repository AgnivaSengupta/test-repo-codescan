name: Test GrepVF Action

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  pull_request:
     branches: [ "main" ]

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write
      actions: read
      issues: write 
      pull-requests: write 
      
    steps:
      # 1. THIS IS MANDATORY: Downloads your code into the runner
      - name: Checkout code to scan
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # 2. Run the scanner
      - name: Run GrepVF Scanner
        uses: AgnivaSengupta/grepvf-action-test@main
        with:
          # Use the latest engine that skips CVEs!
          image-tag: "v1.5.0"
          
          # Groq configuration
          llm-api-key: ${{ secrets.GROQ_API_KEY }}
          llm-api-url: "https://api.groq.com/openai/v1/chat/completions"
          llm-model: "llama-3.1-8b-instant"
          llm-triage-model: "llama-3.1-8b-instant"
